services:
  eureka:
    image: steeltoeoss/eureka-server:latest
    ports:
      - "8761:8761"

  customer-service:
    build:
      context: .
      dockerfile: Banking.CustomerService/Dockerfile
    ports:
      - "5001:5001"
    environment:
      - ASPNETCORE_URLS=http://+:5001
      - USE_CONFIG_SERVER=false
      - EUREKA__CLIENT__SERVICEURLS__DEFAULTZONE=http://eureka:8761/eureka/
      - EUREKA__CLIENT__SERVICEURL__DEFAULTZONE=http://eureka:8761/eureka/
      - Eureka:Client:ServiceUrl=http://eureka:8761/eureka/
    depends_on:
      - eureka

  account-service:
    build:
      context: .
      dockerfile: Banking.AccountService/Dockerfile
    ports:
      - "5002:5002"
    environment:
      - ASPNETCORE_URLS=http://+:5002
      - USE_CONFIG_SERVER=false
      - EUREKA__CLIENT__SERVICEURLS__DEFAULTZONE=http://eureka:8761/eureka/
      - EUREKA__CLIENT__SERVICEURL__DEFAULTZONE=http://eureka:8761/eureka/
      - Eureka:Client:ServiceUrl=http://eureka:8761/eureka/
    depends_on:
      - eureka
      - customer-service

  gateway:
    build:
      context: .
      dockerfile: Banking.Gateway/Dockerfile
    ports:
      - "5000:5000"
    environment:
      - ASPNETCORE_URLS=http://+:5000
      - USE_CONFIG_SERVER=false
      - EUREKA__CLIENT__SERVICEURLS__DEFAULTZONE=http://eureka:8761/eureka/
      - EUREKA__CLIENT__SERVICEURL__DEFAULTZONE=http://eureka:8761/eureka/
      - Eureka:Client:ServiceUrl=http://eureka:8761/eureka/
    depends_on:
      - eureka
      - customer-service
      - account-service
